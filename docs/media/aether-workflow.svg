      <rect width="320" height="36" rx="10" fill="#FCFBFE" stroke="#E7DFF0"/>
      <circle cx="19" cy="18" r="9" fill="#9B72CF"/>
      <text x="37" y="22" fill="#38383E" font-size="12" font-weight="600">Packing</text>
      <text x="250" y="22" fill="#6C4D96" font-size="11" font-weight="700">8 / 14</text>
