<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title description">
  <title id="title">Aether Canvas workspace compilation flow</title>
  <desc id="description">Five ordinary files flow through GPT-5.6 semantic understanding into a living interactive workspace.</desc>
  <defs>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#D9D7D3" opacity=".46"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#24242A" flood-opacity=".10"/>
    </filter>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBFAF8"/>
    </linearGradient>
    <linearGradient id="aether" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27272B"/>
      <stop offset="1" stop-color="#55555C"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="330" rx="22" fill="#F8F8FA"/>
  <rect width="1200" height="330" rx="22" fill="url(#dots)"/>

  <text x="42" y="43" fill="#929298" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.8">ORDINARY FILES</text>
  <text x="487" y="43" fill="#929298" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.8">GPT-5.6 UNDERSTANDING</text>
  <text x="944" y="43" fill="#929298" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.8">LIVING WORKSPACE</text>

