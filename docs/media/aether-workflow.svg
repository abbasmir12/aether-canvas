      <circle cx="19" cy="18" r="9" fill="#4A90D9"/>
      <text x="37" y="22" fill="#38383E" font-size="12" font-weight="600">Journey</text>
      <text x="220" y="22" fill="#55555C" font-size="11" font-weight="600">JFK  →  HND</text>
