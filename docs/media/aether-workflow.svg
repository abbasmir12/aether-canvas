    <path d="M567 165 C674 165 702 159 802 163" stroke="#34A853" stroke-opacity=".20" stroke-width="22"/>
    <path d="M567 219 C674 219 702 215 802 221" stroke="#9B72CF" stroke-opacity=".20" stroke-width="22"/>
