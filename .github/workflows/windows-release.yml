name: Windows release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-windows:
    name: Package Windows installer
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Build Aether Canvas
        shell: pwsh
        run: |
          & npm run build:win 2>&1 | Tee-Object -FilePath windows-build.log
          $buildExitCode = $LASTEXITCODE

          if ($buildExitCode -ne 0) {
            $tail = (Get-Content windows-build.log -Tail 30) -join " | "
            $tail = $tail.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Host "::error title=Windows packaging failed::$tail"
            exit $buildExitCode
          }

      - name: Upload installer for smoke testing
        uses: actions/upload-artifact@v4
        with:
          name: Aether-Canvas-Windows-${{ github.ref_name }}
          path: release/Aether-Canvas-Setup-*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem "release/Aether-Canvas-Setup-*.exe" | Select-Object -First 1
          gh release create "${{ github.ref_name }}" $installer.FullName `
            --repo "${{ github.repository }}" `
            --title "Aether Canvas ${{ github.ref_name }}" `
            --generate-notes `
            --verify-tag
